name: Update Apple Intelligence Rules

on:
  schedule:
    - cron: "10 20 * * 6"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/update-apple-intelligence.yml"
      - ".github/scripts/update_apple_intelligence.py"

permissions:
  contents: write

concurrency:
  group: update-apple-intelligence-rules
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Merge Apple Intelligence rules
        run: python .github/scripts/update_apple_intelligence.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Apple Intelligence rules"
          file_pattern: AppleIntelligence.list
