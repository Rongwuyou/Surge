name: Update WeChat Rules

on:
  schedule:
    - cron: "0 20 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-wechat-rules
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Merge WeChat rules
        run: python .github/scripts/update_wechat.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update WeChat rules"
          file_pattern: WeChat.txt
